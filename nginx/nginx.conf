events {
    worker_connections 1024;
}

http {
    # ── Rate Limiting (anti-DDoS) ─────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Ocultar versión de Nginx ──────────────────────────────────
    server_tokens off;

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Tamaño máximo de carga (para imágenes médicas) ────────────
    client_max_body_size 50M;

    server {
        listen 80;
        server_name _;

        # ── Headers de Seguridad ──────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http:; font-src 'self' https://fonts.gstatic.com;" always;

        # ── Límite de conexiones simultáneas por IP ────────────────
        limit_conn conn_limit 20;

        # ── FRONTEND SPA ──────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=40 nodelay;
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── BACKEND API (rutas /auth, /fhir, /admin, /inference) ──
        location /auth/ {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://backend:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /fhir/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend:8000/fhir/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /admin/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /inference/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend:8000/inference/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass http://backend:8000/health;
        }

        location /docs {
            proxy_pass http://backend:8000/docs;
        }

        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
        }

        # ── Página de error rate limit ────────────────────────────
        error_page 429 /rate_limit.html;
        location = /rate_limit.html {
            return 429 '{"error":"Demasiadas solicitudes. Intenta en un momento.","code":429}';
            default_type application/json;
        }
    }
}
